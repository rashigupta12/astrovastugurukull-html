<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Carousel - Astrovastu Gurukull</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #faf7f2;
            overflow-x: hidden;
        }

        /* ── HERO ── */
        .hero-carousel {
            position: relative;
            width: 100%;
            height: 700px;
            overflow: hidden;
        }

        .slides {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Hidden radio inputs drive the carousel */
        .carousel-input {
            display: none;
        }

        /* SLIDE */
        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: 75% center;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* ── AUTO-PLAY via animation (CSS only) ── */
        /* Slide 1: visible 0–45%, fade 45–50%, hidden 50–95%, fade back 95–100% */
        @keyframes autoS1 {
            0%        { opacity: 1; }
            42%       { opacity: 1; }
            50%       { opacity: 0; }
            92%       { opacity: 0; }
            100%      { opacity: 1; }
        }

        /* Slide 2: hidden 0–45%, fade in 45–50%, visible 50–95%, fade out 95–100% */
        @keyframes autoS2 {
            0%        { opacity: 0; }
            42%       { opacity: 0; }
            50%       { opacity: 1; }
            92%       { opacity: 1; }
            100%      { opacity: 0; }
        }

        /* dot progress for slide1 */
        @keyframes dotS1 {
            0%        { transform: scale(1.3); background: #f5d79e; border-color: #f5d79e; }
            42%       { transform: scale(1.3); background: #f5d79e; border-color: #f5d79e; }
            50%       { transform: scale(1);   background: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.7); }
            92%       { transform: scale(1);   background: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.7); }
            100%      { transform: scale(1.3); background: #f5d79e; border-color: #f5d79e; }
        }

        /* dot progress for slide2 */
        @keyframes dotS2 {
            0%        { transform: scale(1);   background: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.7); }
            42%       { transform: scale(1);   background: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.7); }
            50%       { transform: scale(1.3); background: #f5d79e; border-color: #f5d79e; }
            92%       { transform: scale(1.3); background: #f5d79e; border-color: #f5d79e; }
            100%      { transform: scale(1);   background: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.7); }
        }

        /* Apply auto animations by default */
        .slide1 { animation: autoS1 8s ease-in-out infinite; }
        .slide2 { animation: autoS2 8s ease-in-out infinite; }

        .dot[data-index="0"] { animation: dotS1 8s ease-in-out infinite; }
        .dot[data-index="1"] { animation: dotS2 8s ease-in-out infinite; }

        /* ── MANUAL DOT CLICK overrides animation ── */
        /* When radio 1 is checked */
        #slide1-btn:checked ~ .slides .slide1 {
            animation: none;
            opacity: 1;
        }
        #slide1-btn:checked ~ .slides .slide2 {
            animation: none;
            opacity: 0;
        }
        #slide1-btn:checked ~ .carousel-dots .dot[data-index="0"] {
            animation: none;
            transform: scale(1.3);
            background: #f5d79e;
            border-color: #f5d79e;
        }
        #slide1-btn:checked ~ .carousel-dots .dot[data-index="1"] {
            animation: none;
            transform: scale(1);
            background: rgba(255,255,255,0.45);
            border-color: rgba(255,255,255,0.7);
        }

        /* When radio 2 is checked */
        #slide2-btn:checked ~ .slides .slide1 {
            animation: none;
            opacity: 0;
        }
        #slide2-btn:checked ~ .slides .slide2 {
            animation: none;
            opacity: 1;
        }
        #slide2-btn:checked ~ .carousel-dots .dot[data-index="0"] {
            animation: none;
            transform: scale(1);
            background: rgba(255,255,255,0.45);
            border-color: rgba(255,255,255,0.7);
        }
        #slide2-btn:checked ~ .carousel-dots .dot[data-index="1"] {
            animation: none;
            transform: scale(1.3);
            background: #f5d79e;
            border-color: #f5d79e;
        }

        /* DESKTOP IMAGES */
        .slide1 {
            background-image: url('https://tagmango.com/staticassets/-banner_xl-4d81f03585af197a44a52a5416263125.png');
        }

        .slide2 {
            background-image: url('https://tagmango.com/staticassets/-whatsapp-image-2026-03-11-at-4-dbc22bcf6f6dcfcb22c096849e502838.jpeg');
        }

        /* TABLET IMAGES */
        @media (max-width: 1199px) {
            .slide1 {
                background-image: url('https://tagmango.com/staticassets/-banner_tablet-85209723e146491aa403ffefc79bbd2e.png');
            }
            .slide2 {
                background-image: url('https://tagmango.com/staticassets/-whatsapp-image-2026-03-11-at-5-3a43f4d584b5123cd662d51f7757a9a4.jpeg');
            }
        }

        /* MOBILE IMAGES */
        @media (max-width: 767px) {
            .slide1 {
                background-image: url('https://tagmango.com/staticassets/-banner_mobile-2efa9dd703892bdb8d43a3f8e668a4a0.png');
            }
            .slide2 {
                background-image: url('https://tagmango.com/staticassets/-whatsapp-image-2026-03-11-at-5-406cd46b7e5d87c6cbff71a92c4cee62.jpeg');
            }
        }

        /* SAFE CONTENT ZONE */
        .slide-content {
            position: relative;
            z-index: 2;
            width: 50%;
            max-width: 600px;
            padding-left: clamp(20px, 6vw, 100px);
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            gap: clamp(18px, 2.2vw, 28px);
        }

        /* TEXT */
        .slide-eyebrow {
            background: rgba(245, 215, 158, .18);
            border: 1px solid rgba(245, 215, 158, .4);
            border-radius: 30px;
            padding: 6px 16px;
            width: fit-content;
            color: #f5d79e;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        .slide-title {
            color: #fff;
            font-size: clamp(26px, 4vw, 56px);
            font-weight: 800;
            line-height: 1.1;
        }

        .slide-title em {
            font-family: 'DM Serif Display', serif;
            color: #f5d79e;
        }

        .slide-subtitle {
            color: rgba(255, 255, 255, .9);
            font-size: clamp(14px, 1.7vw, 19px);
            line-height: 1.7;
        }

        /* BADGES */
        .slide-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .slide-badge {
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 20px;
            padding: 5px 14px;
            color: #fff;
            font-size: 15px;
        }

        /* CTA */
        .slide-cta {
            background: linear-gradient(135deg, #e05230, #b85e3a);
            border-radius: 50px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 16px 40px;
            text-decoration: none;
            width: max-content;
            transition: .3s;
        }

        .slide-cta:hover {
            transform: translateY(-3px);
        }

        .banner-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 40px;
            background: linear-gradient(145deg, #b63e00, #8b2e00);
            color: #fff;
            padding: 19px 44px;
            border-radius: 40px;
            font-size: 19px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            transition: .25s;
        }

        .banner-btn:hover {
            transform: translateX(-50%) translateY(-4px);
        }

        /* ── DOTS ── */
        .carousel-dots {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            border: 2px solid rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: background 0.3s, transform 0.3s, border-color 0.3s;
            display: block;
        }

        /* Dot labels are the clickable area */
        .dot-label {
            display: block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1199px) {
            .slide {
                background-position: 82% center;
            }
            .slide-content {
                width: 60%;
            }
            .banner-btn {
                left: 50%;
                transform: translateX(-50%);
                bottom: 40px;
            }
        }

        @media (max-width: 767px) {
            .hero-carousel {
                height: auto;
                aspect-ratio: 9 / 16;
                min-height: 530px;
            }
            .slide {
                align-items: flex-start;
                background-position: top center !important;
                background-size: cover;
            }
            .slide-content {
                width: 100%;
                padding: 40px 20px 0 20px;
                justify-content: flex-start;
                gap: 12px;
            }
            .slide-title {
                font-size: 30px;
                line-height: 1.2;
            }
            .slide-subtitle {
                font-size: 15px;
                max-width: 95%;
            }
            .slide-cta {
                padding: 14px 28px;
                font-size: 16px;
            }
            .banner-btn {
                left: auto;
                right: 18px;
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
                padding: 14px 28px;
                font-size: 15px;
            }
            .carousel-dots {
                bottom: 12px;
            }
        }

        @media (max-width: 480px) {
            .hero-carousel {
                height: 480px;
            }
            .slide-title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <section class="hero-carousel">

        <!-- Hidden radio inputs — MUST be siblings of .slides and .carousel-dots -->
        <input type="radio" class="carousel-input" name="carousel" id="slide1-btn">
        <input type="radio" class="carousel-input" name="carousel" id="slide2-btn">

        <div class="slides">
            <!-- SLIDE 1 -->
            <div class="slide slide1">
                <div class="slide-content">
                    <span class="slide-eyebrow">India's #1 Occult Academy</span>
                    <h1 class="slide-title">India's Trusted<br><em>Occult Academy</em><br>Led by Acharya Lavbhushan</h1>
                    <p class="slide-subtitle">Enroll in Professional Courses in Astrology, Vastu & Numerology with
                        Worldwide Recognized Certification.</p>
                    <div class="slide-badges">
                        <span class="slide-badge">✦ 2.5L+ Students</span>
                        <span class="slide-badge">✦ Certified Courses</span>
                        <span class="slide-badge">✦ Expert Mentors</span>
                    </div>
                    <a href="#courses" class="slide-cta">Explore all Courses</a>
                </div>
            </div>

            <!-- SLIDE 2 -->
            <div class="slide slide2">
                <a href="https://astrovastugurukull.com/getdiplomainoccultsciences" class="banner-btn">Apply Now</a>
            </div>
        </div>

        <!-- DOTS (labels tied to radio inputs) -->
        <div class="carousel-dots">
            <label class="dot" data-index="0" for="slide1-btn" title="Slide 1"></label>
            <label class="dot" data-index="1" for="slide2-btn" title="Slide 2"></label>
        </div>

    </section>
</body>

</html>
