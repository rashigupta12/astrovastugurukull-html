<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section - Astrovastu Gurukull</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      font-size: 18px;
      background-color: #faf7f2;
      color: #2d2d2d;
      line-height: 1.5;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @keyframes heroText {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96)
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    /* HERO SECTION */
    .hero-banner {
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: right center;
      z-index: 0;
      background-image: url('https://tagmango.com/staticassets/-banner_xl-4d81f03585af197a44a52a5416263125.png');
    }

    /* XL default (>1400px) already set above */
    
    /* Website (1200px–1400px) */
    @media (max-width: 1400px) {
      .hero-bg {
        background-image: url('https://tagmango.com/staticassets/-banner_website-854288c866e3f289637f652034469b1a.png');
      }
    }

    /* Tablet (768px–1199px) */
    @media (max-width: 1199px) {
      .hero-bg {
        background-image: url('https://tagmango.com/staticassets/-banner_tablet-85209723e146491aa403ffefc79bbd2e.png');
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 767px) {
      .hero-bg {
        background-image: url('https://tagmango.com/staticassets/-banner_mobile-2efa9dd703892bdb8d43a3f8e668a4a0.png');
      }
    }

    .hero-container {
      width: 100%;
      max-width: 1518px;
      margin: 0 auto;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      position: relative;
      z-index: 2;
      min-height: clamp(480px, 55vw, 700px);
    }

    @media (max-width: 767px) {
      .hero-container {
        min-height: clamp(520px, 130vw, 700px);
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 0;
      }
    }

    .hero-left {
      width: 52%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(40px, 6vw, 80px) clamp(30px, 4vw, 60px) clamp(40px, 6vw, 80px) clamp(24px, 5vw, 80px);
      gap: clamp(18px, 2.2vw, 28px);
      flex-shrink: 0;
    }

    @media (max-width: 767px) {
      .hero-left {
        width: 100%;
        padding: 36px 20px 28px;
        gap: 14px;
        align-items: flex-start;
        max-width: 100%;
        justify-content: flex-start;
      }
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245, 215, 158, 0.18);
      border: 1px solid rgba(245, 215, 158, 0.4);
      border-radius: 30px;
      padding: 6px 16px;
      width: fit-content;
      animation: heroText 0.8s ease 0.4s both;
    }

    .hero-eyebrow span {
      color: #f5d79e;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero-eyebrow::before {
      content: '✦';
      color: #f5d79e;
      font-size: 10px;
    }

    .hero-title {
      color: #fff;
      font-size: clamp(26px, 4.2vw, 58px);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
      animation: heroText 0.8s ease 0.6s both;
      text-align: left;
    }

    .hero-title em {
      font-style: italic;
      font-family: 'DM Serif Display', serif;
      color: #f5d79e;
    }

    .hero-subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(14px, 1.7vw, 19px);
      font-weight: 400;
      line-height: 1.7;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.45);
      animation: heroText 0.8s ease 0.8s both;
      text-align: left;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      animation: heroText 0.8s ease 0.95s both;
      justify-content: flex-start;
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 5px 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .hero-button {
      background: linear-gradient(135deg, #e05230 0%, #b85e3a 100%);
      border: 0;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(15px, 1.4vw, 19px);
      font-weight: 700;
      line-height: 1.2;
      padding: clamp(14px, 1.5vw, 18px) clamp(28px, 3vw, 52px);
      width: max-content;
      max-width: 100%;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(184, 94, 58, 0.4);
      animation: heroText 0.8s ease 1.1s both;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }

    .hero-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(184, 94, 58, 0.5);
    }

    .hero-button:hover::before {
      background: rgba(255, 255, 255, 0.1);
    }

    .hero-button::after {
      content: '→';
      font-size: 18px;
    }

    .hero-right {
      width: 48%;
      flex-shrink: 0;
    }

    @media (max-width:767px) {
      .hero-right {
        display: none;
      }
    }

    /* Optional: Add a subtle overlay for better text readability on mobile */
    @media (max-width: 767px) {
      .hero-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom,
            rgba(10, 2, 0, 0.90) 0%,
            rgba(10, 2, 0, 0.75) 35%,
            rgba(10, 2, 0, 0.30) 65%,
            transparent 100%);
        z-index: 1;
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <!-- HERO SECTION ONLY -->
  <section class="hero-banner">
    <div class="hero-bg"></div>
    <div class="hero-container">
      <div class="hero-left">
        <div class="hero-eyebrow"><span>India's #1 Occult Academy</span></div>
        <h1 class="hero-title">India's Trusted<br><em>Occult Academy</em><br>Led by Acharya Lavbhushan</h1>
        <p class="hero-subtitle">Enroll in Professional Courses in Astrology, Vastu &amp; Numerology with Worldwide Recognized Certification.</p>
        <div class="hero-badges">
          <span class="hero-badge">✦ 2.5L+ Students</span>
          <span class="hero-badge">✦ Certified Courses</span>
          <span class="hero-badge">✦ Expert Mentors</span>
        </div>
        <a href="#" class="hero-button">Explore all Courses</a>
      </div>
      <div class="hero-right"></div>
    </div>
  </section>
</body>
</html>
